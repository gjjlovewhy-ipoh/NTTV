name: 每30分钟自动抓取直播源
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

env:
  # 强制使用 Node24，消除弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行爬虫（重试2次）
        run: |
          for i in {1..2}; do
            python crawl.py && break
            echo "⚠️ 第 $i 次失败，重试中..."
            sleep 10
          done

      - name: 提交更新
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add tv.m3u
          git commit -m "自动更新 $(date +'%Y-%m-%d %H:%M')" || echo "无变化"
          git push
